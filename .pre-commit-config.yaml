repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: isort --settings-file ./.isort.cfg tests/
        language: system
        types: [python]
        pass_filenames: false

      - id: black
        name: black
        entry: black tests/
        language: system
        types: [python]
        pass_filenames: false

      - id: flake8
        name: flake8
        entry: flake8 --config .flake8 tests/
        language: system
        types: [python]
        pass_filenames: false

      - id: codespell
        name: codespell
        entry: codespell tests/
        language: system
        types: [python]
        pass_filenames: false
