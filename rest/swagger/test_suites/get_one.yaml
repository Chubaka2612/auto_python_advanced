summary: Get a specific test suite
description: Retrieves a single test suite by ID
operationId: getTestSuite
tags:
  - Test Suites
security:
  - Bearer: []
parameters:
  - name: test_suite_id
    in: path
    required: true
    type: string
    description: ID of the test suite to retrieve
responses:
  '200':
    description: Test suite details
    schema:
      type: object
      properties:
        test_suite:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            cases:
              type: array
              items:
                type: string
            length:
              type: integer
  '404':
    description: Test suite not found
