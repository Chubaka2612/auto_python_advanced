summary: Get a specific test case
description: Retrieves a single test case by ID
operationId: getTestCase
tags:
  - Test Cases
security:
  - Bearer: []
parameters:
  - name: test_case_id
    in: path
    required: true
    type: string
    description: ID of the test case to retrieve
responses:
  '200':
    description: Test case details
    schema:
      type: object
      properties:
        test_case:
          type: object
          properties:
            id:
              type: string
            suiteID:
              type: string
            title:
              type: string
            description:
              type: string
  '404':
    description: Test case not found
