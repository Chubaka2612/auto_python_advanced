summary: Delete a specific test case
description: Removes a single test case by ID
operationId: deleteTestCase
tags:
  - Test Cases
security:
  - Bearer: []
parameters:
  - name: test_case_id
    in: path
    required: true
    type: string
    description: ID of the test case to delete
responses:
  '200':
    description: Test case deleted successfully
    schema:
      type: object
      properties:
        message:
          type: string
  '404':
    description: Test case not found
